<!DOCTYPE html>
<html>
<head>
    <title>HTML Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<h2 align="center">Student Table</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>Sakshi</td>
        <td>101</td>
        <td>85</td>
    </tr>
    <tr>
        <td>Rahul</td>
        <td>102</td>
        <td>90</td>
    </tr>
    <tr>
        <td>Priya</td>
        <td>103</td>
        <td>88</td>
    </tr>
</table>

</body>
</html>
